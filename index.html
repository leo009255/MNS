<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MNS - Mensagens, Nostalgia & Saudade</title>

    <style>
        /* ===== CSS EMBUTIDO - ESTILO AERO GLASS ===== */
        :root {
            --bg-color: #dbe8f4;
            --window-border: #8ab1cc;
            --title-gradient-start: rgba(255, 255, 255, 0.9);
            --title-gradient-end: rgba(186, 212, 235, 0.85);
            --text-main: #333333;
            --list-bg: #f8fbff;
            --hover-bg: #dcecf9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: radial-gradient(circle, #e2eff9 0%, #b5d3ee 100%);
            font-size: 13px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
            user-select: none; 
            -webkit-user-select: none;
        }

        .window {
            background: var(--bg-color);
            border: 1px solid var(--window-border);
            border-radius: 6px 6px 0 0;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        @media (min-width: 768px) {
            .window {
                width: 320px;
                height: 600px;
                position: relative;
                margin: 20px;
            }
            .chat-window {
                position: absolute;
                width: 400px;
                height: 500px;
            }
        }

        .hidden { display: none !important; }
        .active { display: flex !important; }

        .window-header {
            background: linear-gradient(to bottom, var(--title-gradient-start), var(--title-gradient-end));
            color: #000;
            padding: 4px 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px 5px 0 0;
            cursor: default;
            flex-shrink: 0;
            border-bottom: 1px solid var(--window-border);
        }

        .window-controls button {
            background: transparent;
            border: 1px solid #666;
            color: #000;
            border-radius: 3px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .window-controls .btn-close:hover { background: #ff4d4d; color: white; border-color: #ff4d4d; }

        .xp-button {
            background: linear-gradient(to bottom, #f2f2f2, #d4d0c8);
            border: 1px solid #7a7a7a;
            border-radius: 3px;
            padding: 4px 12px;
            cursor: pointer;
            font-family: Tahoma;
            font-size: 12px;
        }
        .xp-button:active {
            background: #c0c0c0;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Login */
        .login-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex: 1;
            justify-content: center;
        }
        .logo { width: 80px; margin-bottom: 10px; }
        .input-group {
            width: 100%;
            text-align: left;
            margin-bottom: 10px;
        }
        .input-group input {
            width: 100%;
            padding: 4px;
            border: 1px solid #7f9db9;
            user-select: text;
            -webkit-user-select: text;
        }

        /* Perfil */
        .profile-area {
            display: flex;
            padding: 10px;
            background: linear-gradient(to bottom, #ffffff, #e6f0fa);
            border-bottom: 1px solid #b2c9df;
            flex-shrink: 0;
            align-items: center;
            flex-wrap: wrap;
        }
        
        /* Novo estilo dos Avatares baseados em Emojis Aero */
        .avatar-display {
            width: 50px;
            height: 50px;
            border: 2px solid #a0a0a0;
            border-radius: 4px;
            margin-right: 10px;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2);
        }

        .profile-info { flex-grow: 1; }
        .status-select, .phrase-input {
            width: 100%;
            margin-top: 4px;
            font-size: 11px;
            border: 1px solid transparent;
            background: transparent;
        }
        .phrase-input { color: #555; font-style: italic; user-select: text; -webkit-user-select: text;}
        .phrase-input:focus { border: 1px solid #7f9db9; background: white; }

        .profile-actions {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            width: 100%;
        }

        /* Janela de Seleção de Avatares Clássicos */
        .avatar-picker-modal {
            background: white;
            border: 1px solid var(--window-border);
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            width: 100%;
            margin-top: 5px;
            border-radius: 4px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.15);
        }
        .avatar-option {
            font-size: 24px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: #fafafa;
        }
        .avatar-option:hover {
            background: var(--hover-bg);
            border-color: var(--window-border);
        }

        /* Lista de amigos */
        .friends-list-container {
            flex-grow: 1;
            background: var(--list-bg);
            overflow-y: auto;
            border: 1px solid #a0a0a0;
            margin: 5px;
        }
        .group-title {
            padding: 2px 5px;
            font-weight: bold;
            color: #003399;
            border-bottom: 1px solid #d9e6f2;
            display: flex;
            justify-content: space-between;
        }
        .friends-ul { list-style: none; }
        .friends-ul li {
            padding: 8px 5px;
            display: flex;
            align-items: center;
            cursor: pointer;
            justify-content: space-between;
            -webkit-tap-highlight-color: transparent;
        }
        .friends-ul li:hover { background: var(--hover-bg); }
        .friend-info {
            display: flex;
            align-items: center;
            flex: 1;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; margin-right: 8px;
            flex-shrink: 0;
        }
        .online { background: #00ff00; }
        .ausente { background: #ffcc00; }
        .ocupado { background: #ff0000; }
        .invisivel { background: #888888; }
        .offline { background: #aaaaaa; }

        .btn-remove-friend {
            background: transparent;
            border: none;
            color: #cc0000;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 14px;
        }

        /* Chat */
        .chat-info {
            display: flex; padding: 10px; background: white; border-bottom: 1px solid #ccc;
            flex-shrink: 0;
            align-items: center;
        }
        .chat-avatar-display {
            width: 40px;
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f9f9f9;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
        }
        .chat-messages {
            flex-grow: 1; background: white; padding: 10px; overflow-y: auto;
            user-select: text; -webkit-user-select: text;
        }
        .msg-timestamp { color: #999; font-size: 10px; margin-left: 5px; }
        .msg-autor { font-weight: bold; color: #000080; }
        .system-msg { color: #666; font-style: italic; font-size: 11px; text-align: center; margin: 4px 0; }
        .chat-toolbar { padding: 5px; background: #e6f0fa; border-top: 1px solid #ccc; flex-shrink: 0; display: flex; gap: 5px; }
        .chat-input-area {
            display: flex; padding: 5px; background: #e6f0fa; flex-shrink: 0;
        }
        .chat-input {
            flex-grow: 1; resize: none; height: 50px; font-family: Tahoma; border: 1px solid #7f9db9; padding: 4px;
            user-select: text; -webkit-user-select: text;
        }
        .btn-send { margin-left: 5px; height: 50px; }

        #chat-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #chat-container .chat-window {
            pointer-events: all;
            width: 380px;
            height: 480px;
            position: absolute;
            background: var(--bg-color);
            border: 1px solid var(--window-border);
            border-radius: 6px 6px 0 0;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="window active">
        <div class="window-header">
            <span>MNS Messenger</span>
        </div>
        <div class="window-content login-content">
            <img src="logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/1/11/MSN_Messenger_Logo.png'" alt="MNS Logo" class="logo" />
            <h2>Bem-vindo ao MNS</h2>
            <p class="subtitle">Mensagens, Nostalgia & Saudade</p>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">Endereço de e-mail:</label>
                    <input type="email" id="email" required />
                </div>
                <div class="input-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" required />
                </div>
                <div class="actions" style="margin-top: 15px;">
                    <button type="submit" class="xp-button">Entrar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="main-screen" class="window hidden">
        <div class="window-header">
            <span>MNS Messenger</span>
            <div class="window-controls">
                <button class="btn-close" id="btn-logout">X</button>
            </div>
        </div>

        <div class="profile-area">
            <div id="avatar-container" class="avatar-display" style="cursor: pointer;" title="Clique para mudar de personagem">👤</div>

            <div class="profile-info">
                <strong id="my-name">Carregando...</strong>
                <select id="my-status" class="status-select">
                    <option value="online">🟢 Online</option>
                    <option value="ausente">🌙 Ausente</option>
                    <option value="ocupado">🔴 Ocupado</option>
                    <option value="invisivel">⚫ Invisível</option>
                    <option value="offline">⏹ Offline</option>
                </select>
                <input type="text" id="my-phrase" placeholder="Digite uma mensagem pessoal..." class="phrase-input" />
            </div>

            <div id="avatar-picker" class="avatar-picker-modal hidden"></div>

            <div class="profile-actions">
                <button id="btn-add-friend" class="xp-button">➕ Adicionar Amigo</button>
            </div>
        </div>

        <div class="friends-list-container">
            <div class="friends-group">
                <div class="group-title">Meus Amigos</div>
                <ul id="friends-list" class="friends-ul"></ul>
            </div>
        </div>
    </div>

    <div id="chat-container"></div>

    <template id="chat-template">
        <div class="window chat-window">
            <div class="window-header">
                <span class="chat-title">Conversa</span>
                <div class="window-controls">
                    <button class="btn-close-chat">X</button>
                </div>
            </div>
            <div class="chat-info">
                <div class="chat-avatar-display">👤</div>
                <div>
                    <strong class="chat-contact-name">Contato</strong>
                    <p class="chat-contact-phrase" style="color:#555;font-style:italic;font-size:11px;">Frase pessoal</p>
                </div>
            </div>
            <div class="chat-messages"></div>
            <div class="chat-toolbar">
                <button class="btn-nudge xp-button">🔔 Chamar Atenção</button>
                <button class="btn-clear xp-button">🗑️ Apagar Histórico</button> 
            </div>
            <div class="chat-input-area">
                <textarea class="chat-input" maxlength="200" placeholder="Digite uma mensagem..."></textarea>
                <button class="btn-send xp-button">Enviar</button>
            </div>
        </div>
    </template>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, onSnapshot, addDoc, serverTimestamp, orderBy, getDocs, writeBatch, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEUUrSWFDIIWrhkFjSRAZZGFb0StiTjik",
            authDomain: "mns-feba4.firebaseapp.com",
            projectId: "mns-feba4",
            storageBucket: "mns-feba4.firebasestorage.app",
            messagingSenderId: "305256602600",
            appId: "1:305256602600:web:0704376f3612536feca25d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Mapeamento de Personagens (Masculino e Feminino) solicitado por você
        const listaPersonagens = [
            { id: "rockeiro_m", emoji: "🎸", label: "Rockeiro M" },
            { id: "rockeiro_f", emoji: "⚡", label: "Rockeira F" },
            { id: "metaleiro_m", emoji: "💀", label: "Metaleiro M" },
            { id: "metaleiro_f", emoji: "🖤", label: "Metaleira F" },
            { id: "emo_m", emoji: "⚰️", label: "Emo M" },
            { id: "emo_f", emoji: "🌌", label: "Emo F" },
            { id: "punk_m", emoji: "🧷", label: "Punk M" },
            { id: "punk_f", emoji: "🔥", label: "Punk F" },
            { id: "playboy", emoji: "🕶️", label: "Playboy" },
            { id: "patricinha", emoji: "👑", label: "Patricinha" },
            { id: "cao", emoji: "🐶", label: "Cão" },
            { id: "gado", emoji: "🐂", label: "Gado" }
        ];

        const loginScreen = document.getElementById('login-screen');
        const mainScreen = document.getElementById('main-screen');
        const loginForm = document.getElementById('login-form');
        const myNameEl = document.getElementById('my-name');
        const myStatusEl = document.getElementById('my-status');
        const myPhraseEl = document.getElementById('my-phrase');
        const friendsList = document.getElementById('friends-list');
        const btnAddFriend = document.getElementById('btn-add-friend');
        const myAvatarImg = document.getElementById('my-avatar');
        const avatarContainer = document.getElementById('avatar-container');
        const avatarPicker = document.getElementById('avatar-picker');

        let currentUserData = null;
        let lastMessageTime = 0;
        const MESSAGE_COOLDOWN = 3000;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playMsnSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'nudge') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'msg') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert("Erro no login: " + error.message);
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            if (auth.currentUser) {
                updateDoc(doc(db, 'usuarios', auth.currentUser.uid), { status: 'offline' });
                signOut(auth);
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginScreen.classList.remove('active');
                loginScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('active');
                renderAvatarPicker();
                await loadUserProfile(user.uid);
                listenToFriends(user.uid);
            } else {
                mainScreen.classList.remove('active');
                mainScreen.classList.add('hidden');
                loginScreen.classList.remove('hidden');
                loginScreen.classList.add('active');
                document.getElementById('chat-container').innerHTML = '';
            }
        });

        // Monta a janelinha de opções de personagens
        function renderAvatarPicker() {
            avatarPicker.innerHTML = '';
            listaPersonagens.forEach(p => {
                const item = document.createElement('div');
                item.className = 'avatar-option';
                item.innerText = p.emoji;
                item.title = p.label;
                item.addEventListener('click', async () => {
                    avatarContainer.innerText = p.emoji;
                    avatarPicker.classList.add('hidden');
                    currentUserData.foto = p.emoji;
                    await updateDoc(doc(db, 'usuarios', auth.currentUser.uid), { foto: p.emoji });
                });
                avatarPicker.appendChild(item);
            });
        }

        avatarContainer.addEventListener('click', () => {
            avatarPicker.classList.toggle('hidden');
        });

        async function loadUserProfile(uid) {
            const userRef = doc(db, 'usuarios', uid);
            let userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    nome: auth.currentUser.email.split('@')[0],
                    email: auth.currentUser.email, 
                    apelido: '',
                    foto: '👤', // Emoji padrão
                    frase: 'Jogando...',
                    status: 'online',
                    tema: 'classico',
                    amigos: [],
                    ultimoAcesso: serverTimestamp()
                });
                userSnap = await getDoc(userRef);
            }

            currentUserData = userSnap.data();
            
            if (!currentUserData.email) {
                await updateDoc(userRef, { email: auth.currentUser.email });
                currentUserData.email = auth.currentUser.email;
            }

            if (!currentUserData.amigos) {
                await updateDoc(userRef, { amigos: [] });
                currentUserData.amigos = [];
            }

            myNameEl.innerText = currentUserData.nome;
            myStatusEl.value = currentUserData.status;
            myPhraseEl.value = currentUserData.frase;
            avatarContainer.innerText = currentUserData.foto || '👤';

            myStatusEl.addEventListener('change', (e) => {
                updateDoc(userRef, { status: e.target.value });
                currentUserData.status = e.target.value;
            });

            let debounceTimer;
            myPhraseEl.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    updateDoc(userRef, { frase: e.target.value });
                    currentUserData.frase = e.target.value;
                }, 1000);
            });
        }

        btnAddFriend.addEventListener('click', async () => {
            const email = prompt('Digite o e-mail do amigo que deseja adicionar:');
            if (!email) return;

            try {
                const q = query(collection(db, 'usuarios'));
                const snapshot = await getDocs(q);
                let targetUid = null;
                snapshot.forEach(doc => {
                    if (doc.data().email === email) { 
                        targetUid = doc.id;
                    }
                });

                if (!targetUid) {
                    alert('Usuário não encontrado.');
                    return;
                }

                if (targetUid === auth.currentUser.uid) return;

                const userRef = doc(db, 'usuarios', auth.currentUser.uid);
                const targetRef = doc(db, 'usuarios', targetUid);

                await updateDoc(userRef, { amigos: arrayUnion(targetUid) });
                await updateDoc(targetRef, { amigos: arrayUnion(auth.currentUser.uid) });

                alert('Amigo adicionado!');
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        });

        function listenToFriends(uid) {
            const q = query(collection(db, "usuarios"));
            onSnapshot(q, (snapshot) => {
                friendsList.innerHTML = '';
                const friendsUids = currentUserData?.amigos || [];

                snapshot.forEach((docSnap) => {
                    if (docSnap.id === uid) return;
                    if (!friendsUids.includes(docSnap.id)) return; 

                    const friend = docSnap.data();
                    const li = document.createElement('li');
                    
                    const statusColor = friend.status === 'online' ? 'online' :
                        friend.status === 'ausente' ? 'ausente' :
                        friend.status === 'ocupado' ? 'ocupado' : 'invisivel';

                    li.innerHTML = `
                        <div class="friend-info">
                            <div style="font-size: 20px; margin-right: 8px;">${friend.foto || '👤'}</div>
                            <div class="status-dot ${statusColor}"></div>
                            <span><strong>${friend.nome}</strong> <span style="color:#777;font-style:italic;">- ${friend.frase || ''}</span></span>
                        </div>
                        <button class="btn-remove-friend" data-uid="${docSnap.id}">✕</button>
                    `;

                    li.addEventListener('click', (e) => {
                        if(e.target.className !== 'btn-remove-friend') openChatWindow(docSnap.id, friend);
                    });

                    const btnRemove = li.querySelector('.btn-remove-friend');
                    btnRemove.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm(`Remover ${friend.nome}?`)) {
                            const userRef = doc(db, 'usuarios', uid);
                            const targetRef = doc(db, 'usuarios', docSnap.id);
                            await updateDoc(userRef, { amigos: arrayRemove(docSnap.id) });
                            await updateDoc(targetRef, { amigos: arrayRemove(uid) });
                        }
                    });

                    friendsList.appendChild(li);
                });
            });
        }

        function openChatWindow(friendId, friendData) {
            const container = document.getElementById('chat-container');
            const chatId = `chat_${friendId}`;

            if (document.getElementById(chatId)) return;

            const template = document.getElementById('chat-template').content.cloneNode(true);
            const chatDiv = template.querySelector('.chat-window');
            chatDiv.id = chatId;

            chatDiv.style.top = Math.floor(Math.random() * 50 + 50) + 'px';
            chatDiv.style.left = Math.floor(Math.random() * 50 + 50) + 'px';

            chatDiv.querySelector('.chat-contact-name').innerText = friendData.nome;
            chatDiv.querySelector('.chat-avatar-display').innerText = friendData.foto || '👤';
            chatDiv.querySelector('.chat-contact-phrase').innerText = friendData.frase || '';

            const messagesArea = chatDiv.querySelector('.chat-messages');
            const inputField = chatDiv.querySelector('.chat-input');
            const btnSend = chatDiv.querySelector('.btn-send'); 
            const btnNudge = chatDiv.querySelector('.btn-nudge');
            const btnClear = chatDiv.querySelector('.btn-clear');

            chatDiv.querySelector('.btn-close-chat').addEventListener('click', () => chatDiv.remove());

            const conversationId = [auth.currentUser.uid, friendId].sort().join('_');

            const qMsg = query(collection(db, `conversas/${conversationId}/mensagens`), orderBy("data", "asc"));
            onSnapshot(qMsg, (snapshot) => {
                if (snapshot.empty) {
                    messagesArea.innerHTML = '';
                    return;
                }

                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const msg = change.doc.data();

                        if (msg.texto === '/nudge') {
                            chatDiv.classList.add('tremida');
                            playMsnSound('nudge');
                            setTimeout(() => chatDiv.classList.remove('tremida'), 800);
                            messagesArea.innerHTML += `<div class="system-msg">Atenção chamada!</div>`;
                        } else {
                            const isMe = msg.autor === auth.currentUser.uid;
                            const nome = isMe ? currentUserData.nome : friendData.nome;
                            const time = msg.data ? new Date(msg.data.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

                            messagesArea.innerHTML += `
                                <div>
                                    <span class="msg-autor">${nome} diz:</span>
                                    <span class="msg-timestamp">(${time})</span>
                                    <div style="margin-left:10px;margin-bottom:5px;user-select:text;-webkit-user-select:text;">${msg.texto}</div>
                                </div>
                            `;
                            if (!isMe) playMsnSound('msg');
                        }
                        messagesArea.scrollTop = messagesArea.scrollHeight;
                    }
                });
            });

            const sendMessage = async (text) => {
                if (!text.trim() || text.length > 200) return;

                const now = Date.now();
                if (now - lastMessageTime < MESSAGE_COOLDOWN && text !== '/nudge') return;
                lastMessageTime = now;

                await addDoc(collection(db, `conversas/${conversationId}/mensagens`), {
                    autor: auth.currentUser.uid,
                    texto: text,
                    data: serverTimestamp()
                });

                inputField.value = '';
                inputField.focus();
            };

            btnSend.addEventListener('click', () => sendMessage(inputField.value));
            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(inputField.value);
                }
            });

            btnNudge.addEventListener('click', () => sendMessage('/nudge'));

            btnClear.addEventListener('click', async () => {
                if(confirm("Apagar histórico?")) {
                    const qDel = query(collection(db, `conversas/${conversationId}/mensagens`));
                    const snap = await getDocs(qDel);
                    const batch = writeBatch(db);
                    snap.forEach(d => batch.delete(d.ref));
                    await batch.commit(); 
                }
            });

            container.appendChild(chatDiv);
            inputField.focus();
        }
    </script>
</body>
</html>
